<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Telemetry Track | Aaroha World Exim</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-50 text-slate-800 flex flex-col min-h-screen">

    <!-- REUSED NAVBAR -->
    <header class="bg-white/90 backdrop-blur-md shadow-sm sticky top-0 z-50 border-b border-slate-100">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <a href="index.html" class="flex items-center space-x-3">
                <div class="bg-blue-900 text-white p-2.5 rounded-lg font-bold text-xl tracking-wider">A</div>
                <div><span class="font-bold text-xl text-blue-900 tracking-tight">AAROHA</span><span class="text-xs block text-blue-500 font-semibold tracking-widest uppercase">World Exim</span></div>
            </a>
            <nav class="hidden lg:flex space-x-1 font-medium text-sm">
                <a href="index.html" class="px-3 py-2 text-slate-600 hover:text-blue-600 rounded-md">Home</a>
                <a href="about.html" class="px-3 py-2 text-slate-600 hover:text-blue-600 rounded-md">Company</a>
                <a href="services.html" class="px-3 py-2 text-slate-600 hover:text-blue-600 rounded-md">Services</a>
                <a href="csr.html" class="px-3 py-2 text-slate-600 hover:text-blue-600">CSR</a>
                <a href="blogistics.html" class="px-3 py-2 text-slate-600 hover:text-blue-600">Blogistics</a>
                <a href="resources.html" class="px-3 py-2 text-slate-600 hover:text-blue-600">Resources</a>
                <a href="feedback.html" class="px-3 py-2 text-slate-600 hover:text-blue-600">Feedback</a>
            </nav>
            <div class="hidden lg:flex items-center space-x-3"><a href="track.html" class="border border-blue-900 text-blue-900 hover:bg-blue-50 px-4 py-2 rounded-lg font-medium text-sm flex items-center gap-2"><i class="fa-solid fa-location-dot"></i> Track Shipment</a><a href="contact.html" class="bg-blue-900 text-white hover:bg-blue-800 px-4 py-2 rounded-lg font-medium text-sm">Contact Us</a></div>
        </div>
    </header>

    <main class="flex-grow max-w-md mx-auto px-6 py-12 w-full">
        <div class="bg-white p-6 border rounded-xl shadow-sm space-y-4">
            <div><h2 class="text-xl font-bold">Global Waybill Telemetry</h2><p class="text-xs text-slate-400">Query mock tracking infrastructure coordinates.</p></div>
            <div class="flex gap-2">
                <input id="waybill-code" type="text" value="AWE-99823-X" class="bg-slate-50 border rounded-lg px-3 py-2 text-xs font-mono font-bold flex-grow focus:outline-none">
                <button onclick="triggerTrack()" class="bg-blue-900 text-white font-bold text-xs px-4 py-2 rounded-lg">Query Matrix</button>
            </div>
            <div id="telemetry-display" class="border-t pt-3"><p class="text-xs text-slate-400 italic">Ready for validation inputs...</p></div>
        </div>
    </main>

    <script>
        function triggerTrack() {
            const val = document.getElementById('waybill-code').value;
            const target = document.getElementById('telemetry-display');
            target.innerHTML = `<p class="text-xs text-blue-600 font-medium animate-pulse"><i class="fa-solid fa-spinner fa-spin mr-1"></i> Running node arrays for ${val}...</p>`;
            setTimeout(() => {
                target.innerHTML = `
                    <div class="bg-emerald-50 border border-emerald-200 p-3 rounded-lg text-xs space-y-1">
                        <span class="font-bold text-emerald-800 block">✓ Cargo Manifest Located</span>
                        <p class="text-slate-500">Milestone: Passed Customs Hub Clearance Array successfully.</p>
                    </div>`;
            }, 700);
        }
    </script>
</body>
</html>
